<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Datasheet Unavailable</title>
    <meta name="viewport" content="width=device-width, inital-scale=1">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background: #014d67;
            color: white;
        }

        .wrap {
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            gap: 16px;
            align-items: center;
            padding: 20px;
            background: rgba(0,0,0,0.2);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 140px;
            height: 54px;
            padding: 0 20px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 24px;
            font-weight: 700;
            color: white;
            background: #222;
            border: none;
            cursor: pointer;
        }

        .btn.home {
            background: #ea5b0c;
        }

        .content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
        }

        .card {
            max-width: 900px;
            width: 100%;
            background: rgba(0,0,0,0.22);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 44px;
        }

        p {
            font-size: 28px;
            line-height: 1.4;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <button class="btn" onclick="history.back()">Back</button>
            <a class="btn home" href="https://www.themetalcompany.co.nz">Home</a>
        </div>

        <div class="content">
            <div class="card">
                <h1>Datasheet unavailable on kiosk</h1>
                <p>Please ask a staff member if you need this PDF or product datasheet.</p>
            </div>
        </div>
    </div>
</body>
</html>
